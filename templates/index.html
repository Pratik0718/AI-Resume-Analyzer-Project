<!DOCTYPE html>
<html>
<head>
    <title>AI Resume Analyzer</title>
    <style>
        body {
            font-family: Arial;
            background: #f4f6f9;
            text-align: center;
        }

        .container {
            width: 50%;
            margin: auto;
            margin-top: 50px;
            padding: 30px;
            background: white;
            border-radius: 10px;
            box-shadow: 0px 0px 10px rgba(0,0,0,0.1);
        }

        h1 {
            color: #333;
        }

        input, textarea {
            width: 90%;
            padding: 10px;
            margin: 10px;
            border-radius: 5px;
            border: 1px solid #ccc;
        }

        button {
            padding: 12px 25px;
            background: #007bff;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        button:hover {
            background: #0056b3;
        }

        .result {
            margin-top: 20px;
            padding: 20px;
            background: #eafaf1;
            border-radius: 10px;
            display: none;
        }

        .score {
            font-size: 22px;
            color: green;
        }

        .loading {
            display: none;
            margin-top: 10px;
            color: #007bff;
        }
    </style>
</head>

<body>

<div class="container">
    <h1>AI Resume Analyzer 🚀</h1>

    <form id="form">
        <input type="file" name="resume" required><br>
        <textarea name="job_desc" placeholder="Paste Job Description..." required></textarea><br>
        <button type="submit">Analyze Resume</button>
    </form>

    <div class="loading" id="loading">⏳ Analyzing...</div>

    <div class="result" id="result">
        <h2>Result</h2>

        <!-- Progress Bar -->
        <div style="background:#ddd; border-radius:10px; width:100%; height:25px;">
            <div id="progress" style="height:25px; background:green; width:0%; border-radius:10px;"></div>
        </div>

        <p class="score" id="score"></p>

        <p><strong>Skills:</strong> <span id="skills"></span></p>

        <p style="color:red;"><strong>Missing Skills:</strong> <span id="missing"></span></p>
    </div>
</div>

<script>
    const form = document.getElementById('form');
    const loading = document.getElementById('loading');
    const resultDiv = document.getElementById('result');

    form.addEventListener('submit', async (e) => {
        e.preventDefault();

        const formData = new FormData(form);

        loading.style.display = 'block';
        resultDiv.style.display = 'none';

        const response = await fetch('/analyze', {
            method: 'POST',
            body: formData
        });

        const data = await response.json();

        loading.style.display = 'none';
        resultDiv.style.display = 'block';

        document.getElementById('score').innerText = "Match Score: " + data.match_score + "%";
        document.getElementById('skills').innerText = data.skills.join(", ");
        document.getElementById('missing').innerText = data.missing_skills.length > 0 
            ? data.missing_skills.join(", ") 
            : "None";

        document.getElementById('progress').style.width = data.match_score + "%";
    });
</script>

</body>
</html>
